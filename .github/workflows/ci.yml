name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: CI_Test_Passw0rd!
        ports:
          - 1433:1433
        options: >-
          --health-cmd="/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'CI_Test_Passw0rd!' -C -Q 'SELECT 1' || exit 1"
          --health-interval=10s --health-timeout=5s --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'
      - run: dotnet restore
      - run: dotnet build --no-restore --configuration Release
      - name: Run tests
        env:
          MES_TEST_CONNECTION_STRING: "Server=localhost,1433;Database=MesMonitoringTest;User Id=sa;Password=CI_Test_Passw0rd!;TrustServerCertificate=True;"
        run: dotnet test --no-build --configuration Release --verbosity normal
